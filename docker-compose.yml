version: '3.8'

services:
  app:
    build: .
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    working_dir: /app/backend
    environment:
      - DEBUG=True
      - DATABASE_URL=sqlite:///./financial_ai.db
    # Hot-reload enabled for development
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
